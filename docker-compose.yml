version: '3.8'

services:
  # Qdrant Vector Database
  qdrant:
    build:
      context: .
      dockerfile: Dockerfile.qdrant
    container_name: reality-engine-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    restart: unless-stopped
    networks:
      - reality-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "-O", "/dev/null", "http://localhost:6333/"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Reality Engine API
  reality-engine:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: reality-engine-app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - QDRANT_URL=http://qdrant:6333
      - VECTOR_DIMENSION=${VECTOR_DIMENSION:-128}
      - MATCH_THRESHOLD=${MATCH_THRESHOLD:-0.85}
      - PORT=3000
    depends_on:
      qdrant:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - reality-network
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/engine/stats"]
      interval: 15s
      timeout: 5s
      retries: 3

  # Visualizer Backend (Proxy Server)
  visualizer-backend:
    build:
      context: ./visualizer/backend
      dockerfile: Dockerfile
    container_name: reality-engine-visualizer-backend
    ports:
      - "3001:3001"
    environment:
      - VIZ_PORT=3001
      - REALITY_ENGINE_URL=http://reality-engine:3000
    depends_on:
      reality-engine:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - reality-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # Visualizer Frontend (React App)
  visualizer-frontend:
    build:
      context: ./visualizer/frontend
      dockerfile: Dockerfile
    container_name: reality-engine-visualizer-frontend
    ports:
      - "5173:80"
    depends_on:
      - visualizer-backend
    restart: unless-stopped
    networks:
      - reality-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 15s
      timeout: 5s
      retries: 3

volumes:
  qdrant_storage:
    driver: local

networks:
  reality-network:
    driver: bridge
