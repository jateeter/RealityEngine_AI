version: '3.8'

services:
  # Loki - Log Aggregation
  # Port 3100 kept bound to host: the Docker logging driver runs on the host
  # daemon and needs localhost:3100 to push logs into the container network.
  loki:
    image: grafana/loki:2.9.3
    container_name: reality-engine-loki
    ports:
      - "3100:3100"
    volumes:
      - ./config/loki-config.yml:/etc/loki/local-config.yaml
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    restart: unless-stopped
    networks:
      - reality-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3100/ready"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Grafana - accessed via TLS proxy at https://localhost:3002
  grafana:
    image: grafana/grafana:10.2.3
    container_name: reality-engine-grafana
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_SECURITY_ADMIN_USER=admin
      - GF_INSTALL_PLUGINS=grafana-clock-panel
      - GF_SERVER_ROOT_URL=https://localhost:3002
    volumes:
      - grafana_data:/var/lib/grafana
      - ./config/grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml
      - ./config/grafana-dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml
      - ./config/dashboards:/var/lib/grafana/dashboards
    depends_on:
      loki:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - reality-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # Qdrant Vector Database - internal only, no host port binding
  qdrant:
    build:
      context: .
      dockerfile: Dockerfile.qdrant
    container_name: reality-engine-qdrant
    volumes:
      - qdrant_storage:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    restart: unless-stopped
    networks:
      - reality-network
    logging:
      driver: loki
      options:
        loki-url: "http://localhost:3100/loki/api/v1/push"
        loki-batch-size: "400"
        loki-retries: "2"
        loki-max-backoff: "1000ms"
        loki-external-labels: "service=qdrant,environment=production,app=reality-engine"
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/6333 && printf 'GET /readyz HTTP/1.0\\r\\nHost:localhost\\r\\n\\r\\n' >&3 && read -t 3 r <&3 && echo \"$$r\" | grep -q '200'"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Reality Engine API - accessed via TLS proxy at https://localhost:3000
  reality-engine:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: reality-engine-app
    environment:
      - NODE_ENV=production
      - QDRANT_URL=http://qdrant:6333
      - VECTOR_DIMENSION=${VECTOR_DIMENSION:-128}
      - MATCH_THRESHOLD=${MATCH_THRESHOLD:-0.85}
      - PORT=3000
    depends_on:
      qdrant:
        condition: service_healthy
      loki:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - reality-network
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./examples/machines:/app/examples/machines
    logging:
      driver: loki
      options:
        loki-url: "http://localhost:3100/loki/api/v1/push"
        loki-batch-size: "400"
        loki-retries: "2"
        loki-max-backoff: "1000ms"
        loki-external-labels: "service=reality-engine,environment=production,app=reality-engine"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/engine/stats"]
      interval: 15s
      timeout: 5s
      retries: 3

  # Visualizer Backend (Proxy Server) - accessed via TLS proxy at https://localhost:3001
  visualizer-backend:
    build:
      context: ./visualizer/backend
      dockerfile: Dockerfile
    container_name: reality-engine-visualizer-backend
    environment:
      - VIZ_PORT=3001
      - REALITY_ENGINE_URL=http://reality-engine:3000
    depends_on:
      reality-engine:
        condition: service_healthy
      loki:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - reality-network
    logging:
      driver: loki
      options:
        loki-url: "http://localhost:3100/loki/api/v1/push"
        loki-batch-size: "400"
        loki-retries: "2"
        loki-max-backoff: "1000ms"
        loki-external-labels: "service=visualizer-backend,environment=production,app=reality-engine"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # Visualizer Frontend (React App) - accessed via TLS proxy at https://localhost:5173
  visualizer-frontend:
    build:
      context: ./visualizer/frontend
      dockerfile: Dockerfile
    container_name: reality-engine-visualizer-frontend
    depends_on:
      - visualizer-backend
      - loki
    restart: unless-stopped
    networks:
      - reality-network
    logging:
      driver: loki
      options:
        loki-url: "http://localhost:3100/loki/api/v1/push"
        loki-batch-size: "400"
        loki-retries: "2"
        loki-max-backoff: "1000ms"
        loki-external-labels: "service=visualizer-frontend,environment=production,app=reality-engine"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:80/"]
      interval: 15s
      timeout: 5s
      retries: 3

  # Perception Engine Backend - accessed via TLS proxy at https://localhost:3004
  perception-engine-backend:
    build:
      context: ./perception-engine/backend
      dockerfile: Dockerfile
    container_name: reality-engine-perception-backend
    environment:
      - PORT=3004
      - PERCEPTION_TARGET_URL=http://visualizer-backend:3001
      - REALITY_ENGINE_URL=http://reality-engine:3000
      - DATA_PATH=/app/data
    volumes:
      - perception_sources_data:/app/data
    depends_on:
      visualizer-backend:
        condition: service_healthy
      loki:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - reality-network
    logging:
      driver: loki
      options:
        loki-url: "http://localhost:3100/loki/api/v1/push"
        loki-batch-size: "400"
        loki-retries: "2"
        loki-max-backoff: "1000ms"
        loki-external-labels: "service=perception-engine-backend,environment=production,app=reality-engine"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3004/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # Perception Engine Frontend - accessed via TLS proxy at https://localhost:3005
  perception-engine-frontend:
    build:
      context: ./perception-engine/frontend
      dockerfile: Dockerfile
    container_name: reality-engine-perception-frontend
    depends_on:
      - perception-engine-backend
    restart: unless-stopped
    networks:
      - reality-network
    logging:
      driver: loki
      options:
        loki-url: "http://localhost:3100/loki/api/v1/push"
        loki-batch-size: "400"
        loki-retries: "2"
        loki-max-backoff: "1000ms"
        loki-external-labels: "service=perception-engine-frontend,environment=production,app=reality-engine"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:80/"]
      interval: 15s
      timeout: 5s
      retries: 3

  # TLS Termination Proxy — the only service that binds external ports.
  # Terminates HTTPS/WSS and forwards plain HTTP/WS to internal services.
  # Requires: certs/server.crt and certs/server.key (run bash certs/generate-dev-certs.sh)
  tls-proxy:
    image: nginx:alpine
    container_name: reality-engine-tls-proxy
    ports:
      - "3000:3000"
      - "3001:3001"
      - "3002:3002"
      - "3004:3004"
      - "3005:3005"
      - "5173:5173"
    volumes:
      - ./nginx/tls-proxy.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      reality-engine:
        condition: service_healthy
      visualizer-backend:
        condition: service_healthy
      visualizer-frontend:
        condition: service_healthy
      grafana:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - reality-network
    logging:
      driver: loki
      options:
        loki-url: "http://localhost:3100/loki/api/v1/push"
        loki-batch-size: "400"
        loki-retries: "2"
        loki-max-backoff: "1000ms"
        loki-external-labels: "service=tls-proxy,environment=production,app=reality-engine"
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  qdrant_storage:
    driver: local
  loki_data:
    driver: local
  grafana_data:
    driver: local
  perception_sources_data:
    driver: local

networks:
  reality-network:
    driver: bridge
