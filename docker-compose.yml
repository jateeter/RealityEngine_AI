version: '3.8'

services:
  # Loki - Log Aggregation
  loki:
    image: grafana/loki:2.9.3
    container_name: reality-engine-loki
    ports:
      - "3100:3100"
    volumes:
      - ./config/loki-config.yml:/etc/loki/local-config.yaml
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    restart: unless-stopped
    networks:
      - reality-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3100/ready"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Grafana - Visualization and Dashboards
  grafana:
    image: grafana/grafana:10.2.3
    container_name: reality-engine-grafana
    ports:
      - "3002:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_SECURITY_ADMIN_USER=admin
      - GF_INSTALL_PLUGINS=grafana-clock-panel
    volumes:
      - grafana_data:/var/lib/grafana
      - ./config/grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml
      - ./config/grafana-dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml
      - ./config/dashboards:/var/lib/grafana/dashboards
    depends_on:
      loki:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - reality-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # Qdrant Vector Database
  qdrant:
    build:
      context: .
      dockerfile: Dockerfile.qdrant
    container_name: reality-engine-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    restart: unless-stopped
    networks:
      - reality-network
    logging:
      driver: loki
      options:
        loki-url: "http://localhost:3100/loki/api/v1/push"
        loki-batch-size: "400"
        loki-retries: "2"
        loki-max-backoff: "1000ms"
        labels: "service=qdrant,environment=production,app=reality-engine"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:6333/readyz"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Reality Engine API
  reality-engine:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: reality-engine-app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - QDRANT_URL=http://qdrant:6333
      - VECTOR_DIMENSION=${VECTOR_DIMENSION:-128}
      - MATCH_THRESHOLD=${MATCH_THRESHOLD:-0.85}
      - PORT=3000
    depends_on:
      qdrant:
        condition: service_healthy
      loki:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - reality-network
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./examples/machines:/app/examples/machines
    logging:
      driver: loki
      options:
        loki-url: "http://localhost:3100/loki/api/v1/push"
        loki-batch-size: "400"
        loki-retries: "2"
        loki-max-backoff: "1000ms"
        labels: "service=reality-engine,environment=production,app=reality-engine"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/engine/stats"]
      interval: 15s
      timeout: 5s
      retries: 3

  # Visualizer Backend (Proxy Server)
  visualizer-backend:
    build:
      context: ./visualizer/backend
      dockerfile: Dockerfile
    container_name: reality-engine-visualizer-backend
    ports:
      - "3001:3001"
    environment:
      - VIZ_PORT=3001
      - REALITY_ENGINE_URL=http://reality-engine:3000
    depends_on:
      reality-engine:
        condition: service_healthy
      loki:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - reality-network
    logging:
      driver: loki
      options:
        loki-url: "http://localhost:3100/loki/api/v1/push"
        loki-batch-size: "400"
        loki-retries: "2"
        loki-max-backoff: "1000ms"
        labels: "service=visualizer-backend,environment=production,app=reality-engine"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # Visualizer Frontend (React App)
  visualizer-frontend:
    build:
      context: ./visualizer/frontend
      dockerfile: Dockerfile
    container_name: reality-engine-visualizer-frontend
    ports:
      - "5173:80"
    depends_on:
      - visualizer-backend
      - loki
    restart: unless-stopped
    networks:
      - reality-network
    logging:
      driver: loki
      options:
        loki-url: "http://localhost:3100/loki/api/v1/push"
        loki-batch-size: "400"
        loki-retries: "2"
        loki-max-backoff: "1000ms"
        labels: "service=visualizer-frontend,environment=production,app=reality-engine"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 15s
      timeout: 5s
      retries: 3

volumes:
  qdrant_storage:
    driver: local
  loki_data:
    driver: local
  grafana_data:
    driver: local

networks:
  reality-network:
    driver: bridge
