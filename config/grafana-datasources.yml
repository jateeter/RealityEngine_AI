apiVersion: 1

datasources:
  - name: Loki
    type: loki
    uid: loki
    access: proxy
    url: https://loki:3100
    isDefault: true
    editable: true
    jsonData:
      maxLines: 1000
      tlsSkipVerify: true
      derivedFields:
        - datasourceUid: loki
          matcherRegex: "traceID=(\\w+)"
          name: TraceID
          url: "$${__value.raw}"
