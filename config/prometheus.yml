# Prometheus scrape config for the Reality Engine CES coverage telemetry.
#
# Both runtimes (AI / TypeScript and C++) expose /api/metrics in identical
# Prometheus text format, so a single job can target whichever one is up — or
# both, distinguished by the `runtime="ai"|"cpp"` label that each emits on its
# re_runtime_* gauges.
#
# Default targets assume the host-side dev workflow:
#   • TS  Reality Engine — `npm run start` listens on host port 3000
#   • C++ Reality Engine — `bin/reality_engine_server 3299` listens on 3299
#
# Running inside the docker-compose network Prometheus reaches host services
# via host.docker.internal:<port> (which is mapped to host-gateway in compose).

global:
  scrape_interval:     5s
  evaluation_interval: 5s
  external_labels:
    cluster: reality-engine
    environment: dev

scrape_configs:
  # AI / TypeScript Reality Engine — /api/metrics on host:3000
  - job_name: reality-engine-ai
    metrics_path: /api/metrics
    static_configs:
      - targets:
          - host.docker.internal:3000
        labels:
          runtime: ai

  # C++ Reality Engine — /api/metrics on host:3299
  - job_name: reality-engine-cpp
    metrics_path: /api/metrics
    static_configs:
      - targets:
          - host.docker.internal:3299
        labels:
          runtime: cpp

  # Prometheus itself — handy for confirming the scrape stack is healthy.
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090
