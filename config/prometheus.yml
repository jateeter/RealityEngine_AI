# Prometheus scrape config for the Reality Engine CES coverage telemetry.
#
# All three runtimes (AI / TypeScript, C++, Common Lisp) expose /api/metrics
# in identical Prometheus text format.  Every metric line carries a
# `runtime="ai"|"cpp"|"lsp"` label so a single Grafana dashboard can pivot by
# source runtime without scrape-time relabels.
#
# Default targets assume the host-side dev workflow:
#   • TS   Reality Engine — `npm run start` listens on host port 3000
#   • C++  Reality Engine — `bin/reality_engine_server 3299` listens on 3299
#   • LSP  Reality Engine — `./start.sh` (sbcl) listens on host port 3199
#
# Running inside the docker-compose network Prometheus reaches host services
# via host.docker.internal:<port> (which is mapped to host-gateway in compose).

global:
  scrape_interval:     5s
  evaluation_interval: 5s
  external_labels:
    cluster: reality-engine
    environment: dev

scrape_configs:
  # AI / TypeScript Reality Engine — /api/metrics on host:3000
  - job_name: reality-engine-ai
    metrics_path: /api/metrics
    static_configs:
      - targets:
          - host.docker.internal:3000
        labels:
          runtime: ai

  # C++ Reality Engine — /api/metrics on host:3299
  - job_name: reality-engine-cpp
    metrics_path: /api/metrics
    static_configs:
      - targets:
          - host.docker.internal:3299
        labels:
          runtime: cpp

  # Common Lisp Reality Engine — /api/metrics on host:3199
  - job_name: reality-engine-lsp
    metrics_path: /api/metrics
    static_configs:
      - targets:
          - host.docker.internal:3199
        labels:
          runtime: lsp

  # Prometheus itself — handy for confirming the scrape stack is healthy.
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090
